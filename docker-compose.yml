services:

  # ── 数据库层 ──────────────────────────────────────────────────────────────

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root102
      MYSQL_DATABASE: crawler_db
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot102"]
      interval: 5s
      timeout: 5s
      retries: 12

  mongodb:
    image: mongo:6.0
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 12

  # ── 后端 (FastAPI + Scrapy，同一容器) ─────────────────────────────────────

  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: root
      MYSQL_PASSWORD: root102
      MYSQL_DB: crawler_db
      MONGO_URI: mongodb://mongodb:27017/
    volumes:
      - ./backend:/app   # 挂载源码，支持热重载
    depends_on:
      mysql:
        condition: service_healthy
      mongodb:
        condition: service_healthy

  # ── 前端 (Vue3 + Vite 开发服务器) ─────────────────────────────────────────

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      API_TARGET: http://backend:8000   # Vite 代理服务端转发目标
    volumes:
      - ./frontend/src:/app/src         # 挂载 src，支持热重载
    depends_on:
      - backend

volumes:
  mysql_data:
  mongo_data:
